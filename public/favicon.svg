<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#0f0f0f"/>
  <rect x="5" y="5" width="90" height="90" rx="11" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- ── Piano keys (left) ── -->
  <!-- White keys -->
  <rect x="10" y="12" width="7" height="76" rx="2" fill="#e8e2d8"/>
  <rect x="19" y="12" width="7" height="76" rx="2" fill="#e8e2d8"/>
  <rect x="28" y="12" width="7" height="76" rx="2" fill="#e8e2d8"/>
  <rect x="37" y="12" width="7" height="76" rx="2" fill="#e8e2d8"/>

  <!-- Black keys -->
  <rect x="15" y="12" width="6" height="46" rx="1.5" fill="#111"/>
  <rect x="24" y="12" width="6" height="46" rx="1.5" fill="#111"/>
  <rect x="42" y="12" width="6" height="46" rx="1.5" fill="#111"/>

  <!-- Divider -->
  <rect x="50" y="10" width="1.5" height="80" rx="1" fill="#2a2a2a"/>

  <!-- ── Piano roll (right) ── -->
  <rect x="53" y="10" width="37" height="80" rx="2" fill="#141414"/>

  <!-- Grid lines -->
  <line x1="53" y1="24" x2="90" y2="24" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="53" y1="38" x2="90" y2="38" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="53" y1="52" x2="90" y2="52" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="53" y1="66" x2="90" y2="66" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="53" y1="80" x2="90" y2="80" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Note blocks -->
  <rect x="55" y="14" width="20" height="8" rx="2" fill="#f07040"/>
  <rect x="77" y="14" width="11" height="8" rx="2" fill="#f07040" opacity="0.5"/>

  <rect x="55" y="28" width="10" height="8" rx="2" fill="#f07040" opacity="0.55"/>
  <rect x="67" y="28" width="21" height="8" rx="2" fill="#f07040"/>

  <rect x="55" y="42" width="17" height="8" rx="2" fill="#f07040"/>
  <rect x="74" y="42" width="14" height="8" rx="2" fill="#f07040" opacity="0.5"/>

  <rect x="55" y="56" width="23" height="8" rx="2" fill="#f07040" opacity="0.6"/>
  <rect x="80" y="56" width="8"  height="8" rx="2" fill="#f07040"/>

  <rect x="55" y="70" width="13" height="8" rx="2" fill="#f07040"/>
  <rect x="70" y="70" width="18" height="8" rx="2" fill="#f07040" opacity="0.55"/>

</svg>
